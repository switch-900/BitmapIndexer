<!DOCTYPE html>
<!-- Made possible by @bitlodo and @boppleton -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Bitmap Lookup</title>
  <style>
    :root { color-scheme: dark; --orange: #ffa500; --dim: rgba(255,165,0,.65); --border: rgba(255,165,0,.25); --card: rgba(255,165,0,.03); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #000; color: var(--orange); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; line-height: 1.35; }

    /* ── App: full viewport, no scroll ───────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; padding: 10px 12px 8px; gap: 6px; max-width: 960px; margin: 0 auto; }

    /* ── Top bar ─────────────────────────────────────────── */
    .top { flex: 0 0 auto; }
    .top h1 { font-size: 16px; letter-spacing: .2px; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; color: var(--dim); margin: 4px 0 6px; }
    .meta b { color: var(--orange); font-weight: 600; }
    .meta .sep { opacity: .35; }
    .search { display: flex; gap: 8px; }
    .search input { flex: 1; min-width: 0; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,.4); color: var(--orange); font-size: 16px; outline: none; }
    .search input:focus { border-color: var(--orange); }
    .search button { flex: 0 0 auto; background: var(--orange); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .search button:disabled { opacity: .4; cursor: wait; }
    .search button.loading::after { content: ''; display: inline-block; width: 10px; height: 10px; margin-left: 8px; border-radius: 50%; border: 2px solid rgba(255,255,255,.5); border-top-color: #fff; animation: spin .7s linear infinite; vertical-align: -1px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { font-size: 11px; color: var(--dim); margin-top: 3px; min-height: 14px; }

    /* ── Content area: fills remaining viewport ──────────── */
    .content { flex: 1 1 0; min-height: 0; display: flex; gap: 8px; overflow: hidden; }

    /* ── Info column ─────────────────────────────────────── */
    .info { flex: 0 0 260px; overflow: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--card); padding: 10px; }
    .kv { display: grid; grid-template-columns: 90px 1fr; gap: 4px 8px; padding: 6px 0; border-top: 1px solid rgba(255,165,0,.12); font-size: 13px; }
    .kv:first-child { border-top: none; padding-top: 0; }
    .label { color: var(--dim); font-size: 11px; }
    .value { min-width: 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace; word-break: break-word; overflow-wrap: anywhere; font-size: 12px; }
    a { color: var(--orange); }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .pill { padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,165,0,.05); color: var(--orange); font-size: 11px; cursor: pointer; text-decoration: none; }
    .pill:active { transform: translateY(1px); }

    /* ── Bitmap (Mondrian) column ────────────────────────── */
    .bitmap { flex: 1 1 0; min-width: 0; min-height: 0; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 10px; background: var(--card); overflow: hidden; position: relative; }
    #visualizer { position: absolute; inset: 0; }

    /* Placeholder */
    .empty { display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; color: var(--dim); font-size: 13px; text-align: center; padding: 20px; }

    /* ── Mobile: stack vertically, tabs ──────────────────── */
    .tabs { display: none; flex: 0 0 auto; gap: 0; }
    .tabs button { flex: 1; background: transparent; color: var(--dim); border: 1px solid var(--border); border-bottom: none; padding: 5px 0; font-size: 12px; cursor: pointer; border-radius: 8px 8px 0 0; }
    .tabs button.active { background: var(--card); color: var(--orange); font-weight: 600; }

    @media (max-width: 639px) {
      .content { flex-direction: column; }
      .info { flex: 1 1 0; min-height: 0; }
      .bitmap { flex: 1 1 0; min-height: 0; }
      .tabs { display: flex; }
      .content > .hidden { display: none; }
    }
    @media (min-width: 640px) {
      .tabs { display: none; }
      .content > .hidden { display: flex; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>Bitmap Lookup</h1>
      <div class="meta" id="heights"></div>
      <div class="search">
        <input type="number" id="bitmapNumber" placeholder="Block / bitmap number" inputmode="numeric" min="0" step="1" />
        <button id="loadBtn">Load</button>
      </div>
      <div id="status" aria-live="polite"></div>
    </div>

    <div class="tabs" id="tabBar">
      <button class="active" data-tab="info">Info</button>
      <button data-tab="bitmap">Bitmap</button>
    </div>

    <div class="content">
      <div class="info" id="panelInfo" data-name="info">
        <div id="result"><div class="empty">Enter a bitmap number above</div></div>
      </div>
      <div class="bitmap hidden" id="panelBitmap" data-name="bitmap">
        <div class="empty" id="vizPlaceholder">Bitmap pattern will appear here</div>
        <div id="visualizer"></div>
      </div>
    </div>
  </div>

  <script>
    const CHUNK = 100000;
    const MONDRIAN_ID = '55551557695dd82a2bda5ec3497684ec7cbb2cc1752ff5101accff1648666c3ai0';
    const RAW_GH = 'https://raw.githubusercontent.com/switch-900/BitmapIndexer/main/';
    const chunkCache = new Map();
    let modPromise = null;
    const $ = id => document.getElementById(id);

    /* ── Tabs (mobile) ───────────────────────────────────── */
    const tabBtns = document.querySelectorAll('.tabs button');
    const contentPanels = document.querySelectorAll('.content > *');
    const isMobile = () => window.innerWidth < 640;

    function switchTab(name) {
      tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      contentPanels.forEach(p => {
        if (isMobile()) p.classList.toggle('hidden', p.dataset.name !== name);
        else p.classList.remove('hidden');
      });
    }
    tabBtns.forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
    window.addEventListener('resize', () => { if (!isMobile()) contentPanels.forEach(p => p.classList.remove('hidden')); });

    /* ── Helpers ──────────────────────────────────────────── */
    function setStatus(t) { $('status').textContent = String(t || ''); }

    function clearAll() {
      setStatus('');
      $('result').innerHTML = '<div class="empty">Enter a bitmap number above</div>';
      $('visualizer').innerHTML = '';
      $('vizPlaceholder').style.display = '';
    }

    function parseNum(v) {
      const m = String(v || '').trim().match(/\d+/);
      if (!m) return null;
      const n = parseInt(m[0], 10);
      return Number.isFinite(n) && n >= 0 ? n : null;
    }

    async function fetchJson(url) {
      const r = await fetch(url, { cache: 'no-cache' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    async function loadChunk(start) {
      if (chunkCache.has(start)) return chunkCache.get(start);
      const file = `bitmaps/${start}-${start + CHUNK - 1}.json`;
      try { const d = await fetchJson(`./${file}`); chunkCache.set(start, d); return d; }
      catch { const d = await fetchJson(`${RAW_GH}${file}`); chunkCache.set(start, d); return d; }
    }

    async function getMod() {
      if (modPromise) return modPromise;
      modPromise = (async () => {
        const code = await fetch(`https://ordinals.com/content/${MONDRIAN_ID}`).then(r => r.text());
        return import(URL.createObjectURL(new Blob([code], { type: 'application/javascript' })));
      })();
      return modPromise;
    }

    /* ── Render Mondrian ─────────────────────────────────── */
    async function renderMondrian(blockNum) {
      const c = $('visualizer');
      c.innerHTML = '';
      $('vizPlaceholder').style.display = 'none';

      const [block, mod] = await Promise.all([
        fetch(`https://blockchain.info/rawblock/${blockNum}?cors=true`).then(r => r.json()),
        getMod()
      ]);

      const sizes = block.tx.map(tx => mod.getSquareSize(tx.out.reduce((s, o) => s + o.value, 0)));
      const mondrian = new mod.MondrianLayout(sizes);

      // Use parent (.bitmap) rect so we fill the panel exactly
      const parent = c.parentElement;
      const rect = parent.getBoundingClientRect();
      const w = Math.max(100, rect.width);
      const h = Math.max(100, rect.height);
      const scale = Math.min(w / mondrian.width, h / mondrian.height);

      // Centre the pattern
      const pw = mondrian.width * scale;
      const ph = mondrian.height * scale;
      const ox = Math.max(0, (w - pw) / 2);
      const oy = Math.max(0, (h - ph) / 2);

      mondrian.slots.forEach((slot, i) => {
        const d = document.createElement('div');
        Object.assign(d.style, {
          position: 'absolute',
          left: `${ox + slot.position.x * scale}px`,
          top:  `${oy + slot.position.y * scale}px`,
          width:  `${(slot.size - .5) * scale}px`,
          height: `${(slot.size - .5) * scale}px`,
          backgroundColor: 'orange',
          overflow: 'hidden', fontSize: '9px', color: '#000',
          display: 'flex', alignItems: 'center', justifyContent: 'center'
        });
        d.onmouseover = () => { d.style.backgroundColor = 'red'; d.textContent = i; };
        d.onmouseout  = () => { d.style.backgroundColor = 'orange'; d.textContent = ''; };
        c.appendChild(d);
      });
    }

    /* ── Main load ───────────────────────────────────────── */
    async function load() {
      clearAll();
      const btn = $('loadBtn');
      const num = parseNum($('bitmapNumber').value);
      if (num === null) {
        $('result').innerHTML = '<div class="kv"><div class="label">Error</div><div class="value">Enter a valid block number.</div></div>';
        return;
      }

      btn.disabled = true; btn.classList.add('loading'); btn.textContent = 'Loading';

      try {
        setStatus('Fetching bitmap index…');
        const start = Math.floor(num / CHUNK) * CHUNK;
        const chunk = await loadChunk(start);
        const id = chunk[num - start] || null;
        const inscUrl = id ? `https://ordinals.com/inscription/${id}` : null;

        $('result').innerHTML = [
          `<div class="kv"><div class="label">Bitmap</div><div class="value mono">${num}</div></div>`,
          `<div class="kv"><div class="label">Inscription</div><div class="value mono">${id ? `<a href="${inscUrl}" target="_blank">${id}</a>` : '<span style="color:var(--dim)">null (not yet inscribed)</span>'}</div></div>`,
          id ? `<div class="actions"><button class="pill" id="copyBtn">Copy id</button><a class="pill" href="${inscUrl}" target="_blank">ordinals.com</a></div>` : ''
        ].join('');

        if (id) {
          $('copyBtn')?.addEventListener('click', async () => {
            try { await navigator.clipboard.writeText(id); setStatus('Copied!'); }
            catch { setStatus('Copy blocked by browser.'); }
          }, { once: true });
        }

        setStatus('Rendering bitmap pattern…');
        await renderMondrian(num);
        setStatus('');
        if (isMobile()) switchTab('bitmap');
      } catch (err) {
        console.error(err);
        $('result').innerHTML = `<div class="kv"><div class="label">Error</div><div class="value">${err?.message || err}</div></div>`;
        setStatus('');
      } finally {
        btn.disabled = false; btn.classList.remove('loading'); btn.textContent = 'Load';
      }
    }

    $('loadBtn').addEventListener('click', load);
    $('bitmapNumber').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });

    /* ── Meta / height indicators ────────────────────────── */
    async function loadMeta() {
      try {
        let meta;
        try { meta = await fetchJson('./bitmaps/meta.json'); }
        catch { meta = await fetchJson(`${RAW_GH}bitmaps/meta.json`); }
        const p = [];
        if (meta.ordTip != null) p.push(`<span>Block height: <b>${Number(meta.ordTip).toLocaleString()}</b></span>`);
        if (meta.maxBitmap != null) p.push(`<span>Indexed to: <b>${Number(meta.maxBitmap).toLocaleString()}</b></span>`);
        if (meta.updatedAt) p.push(`<span>Updated: <b>${new Date(meta.updatedAt).toLocaleString()}</b></span>`);
        $('heights').innerHTML = p.join('<span class="sep">|</span>');
      } catch {}
    }
    loadMeta();

    if (!isMobile()) contentPanels.forEach(p => p.classList.remove('hidden'));
    setTimeout(() => { try { $('bitmapNumber').focus(); } catch {} }, 50);
  </script>
</body>
</html>
